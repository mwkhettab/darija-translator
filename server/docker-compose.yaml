services:
  server:
    build: .
    restart: unless-stopped

    environment:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1

    expose:
      - "8000"

    depends_on:
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    restart: unless-stopped

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"

    volumes:
      - redis_data:/data

    expose:
      - "6379"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://server:8000

volumes:
  redis_data:
  